<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HPLC Simulator — Virtual Analytical Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../css/global.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="hero">
  <h1>HPLC Simulator</h1>
  <p>Interactive reversed-phase HPLC virtual instrument</p>
</header>

<main class="instrument-grid">

  <div class="area-status" style="padding: 12px 40px 0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
    <span id="status" class="status-badge">IDLE</span>
    <span id="satWarning" class="status-badge error" style="display: none;">⚠️ DETECTOR SATURATED</span>
    <span id="pressureWarning" class="status-badge error" style="display: none;">🚨 OVERPRESSURE SHUTDOWN</span>
  </div>

  <div class="instrument-card area-diagram">
    <h2 style="margin-top:0">HPLC Flow Schematic</h2>
    <div id="diagramContainer" style="overflow-x:auto;">Loading diagram…</div>
  </div>

  <div class="instrument-card area-controls">
    <h2 style="margin-top:0">Method Parameters</h2>

    <label for="flowInput">Flow Rate &nbsp;<span class="param-val" id="flowVal">1.0</span> mL/min</label>
    <input id="flowInput" type="range" min="0.5" max="5.0" step="0.1" value="1.0">

    <br><br>

    <label for="organicInput">Mobile Phase %B &nbsp;<span class="param-val" id="organicVal">40%</span></label>
    <input id="organicInput" type="range" min="10" max="90" step="5" value="40">

    <br><br>

    <label for="sensitivityInput">Detector Sensitivity &nbsp;<span class="param-val" id="sensitivityVal">1.0</span></label>
    <input id="sensitivityInput" type="range" min="0.5" max="5" step="0.5" value="1">

    <br><br>

    <label for="compoundSelect">Sample Compound</label><br>
    <select id="compoundSelect" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ccc;margin-top:4px">
      <option value="paracetamol">Paracetamol</option>
      <option value="caffeine" selected>Caffeine</option>
      <option value="aspirin">Aspirin</option>
      <option value="ibuprofen">Ibuprofen</option>
      <option value="mixture">── Mixture (all four) ──</option>
    </select>

    <hr style="border:none;border-top:1px solid #eee;margin:16px 0">

    <div style="margin-bottom: 16px;">
      <div style="display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 600;">
        <span>System Pressure</span>
        <span id="pressureVal">0 bar</span>
      </div>
      <meter id="pressureMeter" min="0" max="400" low="250" high="350" optimum="150" value="0"></meter>
    </div>

    <button id="pumpBtn" disabled>▶ Pump START</button>
    <button id="injectBtn" disabled>Inject Sample</button>

    <p id="rtDisplay" style="margin-top:16px;font-size:0.9rem;color:#555;">Estimated RT: —</p>
  </div>

  <div class="instrument-card area-graph">
    <h2 style="margin-top:0">Chromatogram</h2>
    <canvas id="graphCanvas" height="200"></canvas>
  </div>

</main>

<script type="module" src="./hplc.stable.js"></script>

</body>
</html>

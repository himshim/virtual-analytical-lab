<svg viewBox="0 0 1100 280" xmlns="http://www.w3.org/2000/svg">

  <style>
    .block { fill: #f5f5f5; stroke: #333; stroke-width: 2; }
    .block-active { fill: #e3eaf7; stroke: #1565c0; stroke-width: 2.5; }
    .tube { stroke: #aaa; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .label { font-family: Arial, sans-serif; font-size: 13px; fill: #333; text-anchor: middle; }
    .sublabel { font-family: Arial, sans-serif; font-size: 11px; fill: #777; text-anchor: middle; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#aaa"/>
    </marker>
  </defs>

  <!-- ── Blocks ── -->

  <!-- Solvent reservoir -->
  <rect x="30" y="100" width="100" height="70" rx="8" class="block"/>
  <text x="80" y="131" class="label">Solvent</text>
  <text x="80" y="148" class="sublabel">Reservoir</text>

  <!-- Pump -->
  <rect id="pumpBox" x="180" y="100" width="110" height="70" rx="8" class="block"/>
  <text x="235" y="131" class="label">HPLC</text>
  <text x="235" y="148" class="sublabel">Pump</text>

  <!-- Injector -->
  <rect id="injectorBox" x="340" y="100" width="110" height="70" rx="8" class="block"/>
  <text x="395" y="131" class="label">Injector</text>
  <text x="395" y="148" class="sublabel">Port</text>

  <!-- Column -->
  <rect x="500" y="115" width="200" height="40" rx="6" class="block"/>
  <text x="600" y="131" class="label">HPLC Column (C18)</text>

  <!-- Detector -->
  <rect id="detectorBox" x="750" y="100" width="110" height="70" rx="8" class="block"/>
  <text x="805" y="131" class="label">UV/Vis</text>
  <text x="805" y="148" class="sublabel">Detector</text>

  <!-- Waste -->
  <rect x="910" y="140" width="80" height="50" rx="6" class="block"/>
  <text x="950" y="165" class="label" style="font-size:12px">Waste</text>

  <!-- ── Flow tubing / arrows ── -->
  <path class="tube" d="M130 135 H180"/>
  <path class="tube" d="M290 135 H340"/>
  <path class="tube" d="M450 135 H500"/>
  <path class="tube" d="M700 135 H750"/>
  <path class="tube" d="M860 155 V175 H910"/>

  <!-- ── Animation path (invisible, used by JS dot animation) ── -->
  <path id="flowPath"
        d="M30 135 H180 H290 H340 H450 H500 H700 H750 H860 V175 H990"
        stroke="none" fill="none"/>

  <!-- Flow solvent dot -->
  <circle id="flowDot" cx="-20" cy="-20" r="5"
          fill="#1565c0" opacity="0"/>

  <!-- Sample injection dot -->
  <circle id="sampleDot" cx="-20" cy="-20" r="6"
          fill="#e53935" opacity="0"/>

  <!-- ── Pressure gauge icon (decorative) ── -->
  <circle cx="235" cy="90" r="7" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/>
  <line x1="235" y1="90" x2="235" y2="85" stroke="#f57f17" stroke-width="1.5"/>

</svg>
